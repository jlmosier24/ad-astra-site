<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Astra Field Trips | Exploration & Discovery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    
    <style>
        :root {
            --forest-green: #38a169;
            --meadow-green: #c6f6d5;
            --sky-blue: #7bb9e8;
            --earth-brown: #8b5a2b;
            --sun-yellow: #f6e05e;
            --text-dark: #2d3748;
            --bg-page: #f0fff4;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-page);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%;
            background: var(--sky-blue) linear-gradient(180deg, var(--sky-blue) 0%, #ffffff 100%);
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 6px solid var(--earth-brown);
        }

        .header-banner {
            width: 100%; max-width: 1100px;
            height: auto;
            margin-top: 20px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .title-section {
            background: white; width: 100%; text-align: center; padding: 20px 0;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--earth-brown);
            font-size: 3.5rem; margin: 0;
            text-shadow: 2px 2px 0px var(--sun-yellow);
        }

        .subtitle {
            color: var(--forest-green);
            font-weight: 700; font-size: 1.1rem;
            margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 1px;
        }

        .main-container {
            width: 95%; max-width: 1000px;
            background: white;
            margin: 40px 0; padding: 30px;
            border: 4px solid var(--forest-green);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Cursor & Hover Effects */
        .fc-event, .fc-event-main, .fc-daygrid-event {
            cursor: pointer !important;
            transition: transform 0.1s ease-in-out;
        }
        .fc-event:hover { transform: scale(1.02); filter: brightness(1.1); }
        .fc .fc-daygrid-day:hover { cursor: pointer; background-color: rgba(56, 161, 105, 0.05); }

        .fc .fc-toolbar-title {
            font-family: 'Luckiest Guy', cursive;
            color: var(--earth-brown);
            font-size: 2.2rem !important;
        }

        .fc .fc-button-primary { background-color: var(--forest-green); border: none; font-weight: 700; }
        .fc .fc-button-primary:hover { background-color: var(--earth-brown); }

        /* Modal / Form Styling */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .modal {
            background: white; border: 5px solid var(--forest-green);
            border-radius: 30px; padding: 30px; width: 95%; max-width: 500px;
            text-align: center; max-height: 90vh; overflow-y: auto;
            position: relative;
        }

        /* Event Image in Modal */
        #event-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 3px solid var(--meadow-green);
        }

        #event-desc {
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.4;
            margin: 10px 0 20px 0;
            padding: 0 10px;
        }

        .modal h2 { font-family: 'Luckiest Guy', cursive; color: var(--forest-green); font-size: 2rem; margin: 0; }

        /* Form Layout */
        #reg-form { display: none; text-align: left; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%; padding: 10px; border: 2px solid var(--sky-blue); 
            border-radius: 8px; box-sizing: border-box; font-family: inherit;
        }

        .btn-register {
            background: var(--earth-brown); color: white;
            border: none; padding: 15px; border-radius: 12px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <img src="header.png" class="header-banner" alt="Ad Astra Field Trips">
    <div class="title-section">
        <h1>AD ASTRA EXPLORERS</h1>
        <p class="subtitle">Nature & Science Outings • Academic Discovery</p>
    </div>
</header>

<div class="main-container">
    <div id="calendar"></div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <img id="event-img" src="" alt="Event Image">
        <h2 id="event-title"></h2>
        <p id="event-date" style="font-weight: 700; color: #666; margin-top: 5px;"></p>
        <p id="event-desc"></p>
        <p id="event-price" style="font-size: 1.8rem; color: var(--earth-brown); font-weight: 800; margin-bottom: 10px;"></p>

        <div id="email-section">
            <input type="email" id="emailInput" placeholder="Enter approved email">
            <button class="btn-register" onclick="verifyEmail()">Register</button>
        </div>

        <div id="reg-form">
            <div class="form-group">
                <label>Parent/Guardian Name</label>
                <input type="text" id="parentName" placeholder="Full Name">
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="studentName" placeholder="Student's Name">
            </div>
            <div class="form-group">
                <label>Student Grade</label>
                <select id="studentGrade">
                    <option value="">Select Grade</option>
                    <option value="K">Kindergarten</option>
                    <option value="1">1st Grade</option>
                    <option value="2">2nd Grade</option>
                    <option value="3">3rd Grade</option>
                    <option value="4">4th Grade</option>
                    <option value="5">5th Grade</option>
                    <option value="6">6th Grade</option>
                    <option value="7">7th Grade</option>
                    <option value="8">8th Grade</option>
                </select>
            </div>
            <div class="form-group">
                <label>Additional Details / Allergies</label>
                <textarea id="extraDetails" rows="3" placeholder="Any special notes..."></textarea>
            </div>
            <button class="btn-register" onclick="submitRegistration()">Verify & Pay</button>
        </div>

        <p onclick="closeModal()" style="color: #999; cursor: pointer; margin-top: 15px; font-weight: 600;">Cancel</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
    const APPROVED_EMAILS = ["yourname@example.com", "test@test.com"];
    let currentEvent = "";

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next', center: 'title', right: '' },
            events: [
                { 
                    title: 'Forest Bug Safari', 
                    start: '2026-03-15', 
                    backgroundColor: '#38a169', 
                    extendedProps: { 
                        price: "FREE",
                        description: "Grab your magnifying glass! We're headed into the local woodlands to identify native insects, learn about forest ecosystems, and build bug hotels.",
                        img: "safari.png"
                    } 
                },
                { 
                    title: 'Telescope Night', 
                    start: '2026-03-18', 
                    backgroundColor: '#4f7eff', 
                    extendedProps: { 
                        price: "$25.00",
                        description: "Join us under the stars! Our astronomers will guide students through the constellations and provide high-powered telescopes to view the craters of the moon and distant planets.",
                        img: "telescope.png"
                    } 
                }
            ],
            eventClick: function(info) {
                const props = info.event.extendedProps;
                currentEvent = info.event.title;
                
                document.getElementById('event-title').innerText = info.event.title;
                document.getElementById('event-date').innerText = info.event.start.toDateString();
                document.getElementById('event-price').innerText = props.price;
                document.getElementById('event-desc').innerText = props.description;
                document.getElementById('event-img').src = props.img;
                
                // Reset views
                document.getElementById('email-section').style.display = 'block';
                document.getElementById('reg-form').style.display = 'none';
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        });
        calendar.render();
    });

    function closeModal() { 
        document.getElementById('modal-overlay').style.display = 'none'; 
        // Clear fields
        document.getElementById('emailInput').value = "";
        document.getElementById('parentName').value = "";
        document.getElementById('studentName').value = "";
        document.getElementById('studentGrade').value = "";
        document.getElementById('extraDetails').value = "";
    }

    function verifyEmail() {
        const email = document.getElementById('emailInput').value.toLowerCase().trim();
        if (APPROVED_EMAILS.includes(email)) {
            document.getElementById('email-section').style.display = 'none';
            document.getElementById('reg-form').style.display = 'block';
        } else {
            alert("Access Denied: Email not on approved list.");
        }
    }

    function submitRegistration() {
        const pName = document.getElementById('parentName').value;
        const sName = document.getElementById('studentName').value;
        const sGrade = document.getElementById('studentGrade').value;

        if (!pName || !sName || !sGrade) {
            alert("Please fill in all required fields.");
            return;
        }

        alert(`Ready to Register!\nEvent: ${currentEvent}\nParent: ${pName}\nStudent: ${sName}\nGrade: ${sGrade}`);
    }
</script>
</body>

</html>
