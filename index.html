<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Astra Field Trips | Exploration & Discovery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --forest-green: #38a169;
            --meadow-green: #c6f6d5;
            --sky-blue: #7bb9e8;
            --earth-brown: #8b5a2b;
            --sun-yellow: #f6e05e;
            --text-dark: #2d3748;
            --bg-page: #f0fff4;
            --accent-teal: #00b5ad;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-page);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%;
            background: var(--sky-blue) linear-gradient(180deg, var(--sky-blue) 0%, #ffffff 100%);
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 6px solid var(--earth-brown);
        }

        .header-banner {
            width: 100%; max-width: 1100px;
            height: auto;
            margin-top: 20px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .title-section {
            background: white; width: 100%; text-align: center; padding: 20px 0;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--earth-brown);
            font-size: 3.5rem; margin: 0;
            text-shadow: 2px 2px 0px var(--sun-yellow);
        }

        .subtitle {
            color: var(--forest-green);
            font-weight: 700; font-size: 1.1rem;
            margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- Grid Layout --- */
        .main-container {
            width: 95%; max-width: 1100px;
            margin: 40px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        /* --- Event Card Styling (Static) --- */
        .event-card {
            background: white;
            width: 320px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
            /* transform and transition removed to keep card static */
        }

        /* Date Ribbon */
        .date-ribbon {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent-teal);
            color: black;
            font-weight: 800;
            padding: 8px 15px;
            border-bottom-left-radius: 10px;
            font-size: 0.9rem;
            z-index: 10;
        }

        .card-image {
            width: 100%;
            height: 380px; 
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.6rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.4;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .btn-card-register {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-card-register:hover {
            background: var(--earth-brown);
        }

        /* --- Modal Styling --- */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .modal {
            background: white; border: 5px solid var(--forest-green);
            border-radius: 30px; padding: 30px; width: 95%; max-width: 500px;
            text-align: center; max-height: 90vh; overflow-y: auto;
        }

        #reg-form { display: none; text-align: left; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid var(--sky-blue); border-radius: 8px; box-sizing: border-box;}
        
        .btn-submit { background: var(--earth-brown); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <img src="header.png" class="header-banner" alt="Ad Astra Field Trips">
    <div class="title-section">
        <h1>AD ASTRA EXPLORERS</h1>
        <p class="subtitle">Nature & Science Outings • Academic Discovery</p>
    </div>
</header>

<div class="main-container" id="events-grid">
    </div>

<div id="modal-overlay">
    <div class="modal">
        <h2 id="modal-title" style="font-family: 'Luckiest Guy'; color: var(--forest-green);"></h2>
        <p id="modal-details" style="margin-bottom: 20px; color: #555;"></p>

        <div id="email-section">
            <input type="email" id="emailInput" placeholder="Enter approved email">
            <button class="btn-submit" onclick="verifyEmail()" style="margin-top: 10px;">Verify Email</button>
        </div>

        <div id="reg-form">
            <div class="form-group">
                <label>Parent Name</label>
                <input type="text" id="parentName">
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="studentName">
            </div>
            <div class="form-group">
                <label>Grade</label>
                <select id="studentGrade">
                    <option value="K">Kindergarten</option>
                    <option value="1">1st Grade</option>
                    <option value="2">2nd Grade</option>
                </select>
            </div>
            <button class="btn-submit" onclick="submitRegistration()">Complete Registration</button>
        </div>

        <p onclick="closeModal()" style="color: #999; cursor: pointer; margin-top: 15px; font-weight: 600;">Cancel</p>
    </div>
</div>

<script>
    const APPROVED_EMAILS = ["yourname@example.com", "test@test.com"];
    let selectedEventTitle = "";

    const events = [
        {
            title: 'Forest Bug Safari',
            dateLabel: 'MAR 15',
            fullDate: 'Sunday, March 15, 2026',
            price: 'FREE',
            img: 'safari.png',
            desc: "Grab your magnifying glass! Identify native insects, learn about forest ecosystems, and build bug hotels."
        },
        {
            title: 'Telescope Night',
            dateLabel: 'MAR 18',
            fullDate: 'Wednesday, March 18, 2026',
            price: '$25.00',
            img: 'telescope.png',
            desc: "Join us under the stars! Use high-powered telescopes to view the craters of the moon and distant planets."
        }
    ];

    function renderEvents() {
        const grid = document.getElementById('events-grid');
        grid.innerHTML = events.map(event => `
            <div class="event-card">
                <div class="date-ribbon">${event.dateLabel}</div>
                <img src="${event.img}" class="card-image" alt="${event.title}">
                <div class="card-content">
                    <div class="card-title">${event.title}</div>
                    <div class="card-description">${event.desc}</div>
                    <button class="btn-card-register" onclick="openModal('${event.title}', '${event.fullDate}')">Register • ${event.price}</button>
                </div>
            </div>
        `).join('');
    }

    function openModal(title, date) {
        selectedEventTitle = title;
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-details').innerText = date;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('email-section').style.display = 'block';
        document.getElementById('reg-form').style.display = 'none';
    }

    function verifyEmail() {
        const email = document.getElementById('emailInput').value.toLowerCase().trim();
        if (APPROVED_EMAILS.includes(email)) {
            document.getElementById('email-section').style.display = 'none';
            document.getElementById('reg-form').style.display = 'block';
        } else {
            alert("Email not on approved list.");
        }
    }

    function submitRegistration() {
        alert("Registration submitted for " + selectedEventTitle);
        closeModal();
    }

    renderEvents();
</script>

</body>
</html>
